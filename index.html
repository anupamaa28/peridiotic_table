<!DOCTYPE html>
<html>
    <head>
        <link href="chat_style.css" rel="stylesheet"/>
        <script src="Chat.js"></script>
        <script src="Responses.js"></script>       
    </head>

    <body>
        <div id="Heading">
            Peridiotic Table Tester
        </div>
        <div id="chat-bg-box">
            <div id="bg-overlay"></div>
            <div class= "Container" id="ChatContainer" name="ChatContainerName">
               
                <div>
                    <p class="BotMessage">Test your memory of the periodic table!</p>
                </div>

                <div>
                    <p class="BotMessage">Choose your game mode :)</p>
                </div>

              

            </div>
            <div id="text-input-box-background">
                <div>
                    <input type="text" name="UserTextInputName" class="TextBoxInput" id="UserTextInput" placeholder="Type your shit here :P">
                </div>
                <button type="button" id="clear-button" onclick="clearchat()">Clear Chat</button>
            </div>
        </div>

        <div class="HelpBox BotPurpleMessage">
            Enter "view questions" to display the list of question or 
            <button class= "UserPurpleMessage" type="button" id="question-button" onclick="PrintQuestion()"> Click Me!</button> 
        </div>

        <button type="button" class= BotColor id="themeChanger" onclick= "ChangeTheme()"> Change Theme </button>
    </body>

</html>
